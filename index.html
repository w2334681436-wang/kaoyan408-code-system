<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>11408 考研笔记框架系统</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      startup: { typeset: false }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script>
    (function () {
      // 每次发布新版时只需要更新这里的版本号；不要每次打开都随机生成，否则 PWA/Service Worker 会反复重装并造成频闪。
      const APP_VERSION = '20260602-1735-scrollsync';
      window.__APP_VERSION__ = APP_VERSION;
      document.documentElement.setAttribute('data-app-version', APP_VERSION);
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = `./styles/app.css?v=${APP_VERSION}`;
      document.head.appendChild(css);
    })();
  </script>
</head>
<body>
  <div class="app read-mode" id="app">
    <header class="topbar">
      <div class="brand">
        <button class="mobile-toggle small" id="mobileMenuBtn">☰</button>
        <div class="logo">研</div>
        <div>
          <div class="brand-title">11408 笔记框架系统</div>
          <div class="brand-sub" id="appVersionText">默认预览优先 · 编辑双栏 · Markdown/HTML/公式 · IndexedDB</div>
        </div>
      </div>
      <div class="top-actions">
        <div class="searchbox">
          <input id="globalSearch" placeholder="全局搜索：知识点 / 公式 / 题型 / 错题原因，可跳转到具体小节" autocomplete="off" />
          <span class="search-icon">⌕</span>
        </div>
        <div class="page-searchbox" id="pageSearchBox">
          <input id="pageSearchInput" placeholder="页内搜索" autocomplete="off" />
          <span class="page-search-count" id="pageSearchCount">0/0</span>
          <button class="small" id="pageSearchPrevBtn" title="上一个匹配">上一个</button>
          <button class="small" id="pageSearchNextBtn" title="下一个匹配">下一个</button>
          <button class="small ghost" id="pageSearchClearBtn" title="清除页内搜索">清除</button>
        </div>
        <button class="primary" id="modeToggleBtn">编辑</button>
        <button class="soft" id="htmlGlobalBtn">显示HTML</button>
        <button class="soft" id="outlineBtn">思维框架</button>
        <button class="soft" id="fullscreenBtn">全屏</button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <section class="subject-list" id="subjectList"></section>
      <section class="tree-panel">
        <div class="tree-head">
          <div>
            <div class="tree-title" id="treeTitle">章节目录</div>
            <div class="mini-text">章节 / 节 / 子节</div>
          </div>
          <button class="small soft" id="addRootBtn">+章</button>
        </div>
        <div class="tree" id="tree"></div>
      </section>
    </aside>

    <main class="main">
      <section class="editor-head">
        <div class="crumbs">
          <div class="crumb-line" id="breadcrumb">请选择一个小节开始写笔记</div>
          <div class="node-heading"><input id="titleInput" placeholder="小节标题" disabled /></div>
        </div>
        <div class="editor-actions">
          <button id="prevBtn">上一小节</button>
          <button id="nextBtn">下一小节</button>
          <button class="soft" id="addSiblingBtn">+同级</button>
          <button class="soft" id="addChildBtn">+子节</button>
          <button class="soft" id="moveUpBtn">上移</button>
          <button class="soft" id="moveDownBtn">下移</button>
          <button class="danger" id="deleteNodeBtn">删除</button>
          <button class="soft" id="exportBtn">导出</button>
          <button class="soft" id="importBtn">导入</button>
        </div>
      </section>

      <section class="workspace" id="workspace">
        <div class="card editor-card">
          <div class="card-head">
            <div>
              <div class="card-title">Markdown / HTML 编辑</div>
              <div class="mini-text">HTML 只在这里输入；预览页只显示渲染结果</div>
            </div>
            <button class="small" id="focusEditBtn">专注编辑</button>
          </div>
          <div class="toolbar" id="toolbar">
            <button class="small" data-md="# ">大标题</button>
            <button class="small" data-md="## ">二标题</button>
            <button class="small" data-wrap="**|**">加粗</button>
            <button class="small" data-wrap="`|`">行内代码</button>
            <button class="small" data-block="```c\n|\n```">C代码</button>
            <button class="small" data-block="```cpp\n|\n```">C++代码</button>
            <button class="small" data-block="$$\n|\n$$">块公式</button>
            <button class="small" data-wrap="$|$">行内公式</button>
            <button class="small" data-block="> |">引用</button>
            <button class="small" data-block="- |">列表</button>
            <button class="small" data-block="| 知识点 | 结论 | 易错点 |\n|---|---|---|\n| | | |">表格</button>
            <button class="small" id="imageBtn">插入图片</button>
          </div>
          <div class="editor-stack">
            <textarea class="editor" id="mdEditor" placeholder="Markdown 笔记区。支持公式：\n\n行内公式：$f'(x)=2x$\n\n块公式：\n$$\n\\int_0^1 x^2 dx=\\frac{1}{3}\n$$\n\n也支持代码块、图片、表格。" disabled></textarea>
            <div class="html-input-pane">
              <div class="html-input-head">
                <strong>当前小节 HTML 代码</strong>
                <span>预览页会单独渲染，不显示源码</span>
              </div>
              <textarea class="html-editor" id="htmlEditor" placeholder="这里输入 HTML，例如：\n<div style='padding:16px;border-radius:12px;background:#eff6ff'>\n  <h2>Cache 映射图</h2>\n  <p>HTML里也可写公式：$E=mc^2$</p>\n</div>" disabled></textarea>
            </div>
          </div>
          <input type="file" id="imageInput" accept="image/*" hidden />
          <input type="file" id="importFileInput" accept="application/json,.json" hidden />
        </div>

        <div class="card preview-card">
          <div class="card-head preview-head">
            <div>
              <div class="card-title">实时预览</div>
              <div class="mini-text" id="saveState">已保存到浏览器本地 IndexedDB</div>
            </div>
            <button class="small" id="focusPreviewBtn">专注预览</button>
          </div>
          <div class="focus-preview-topbar" id="focusPreviewTopbar">
            <div class="focus-preview-title">专注预览</div>
            <div class="focus-preview-actions">
              <button class="small soft" id="focusPrevBtn">上一节</button>
              <button class="small soft" id="focusNextBtn">下一节</button>
              <button class="small soft" id="focusHtmlBtn">显示HTML</button>
              <button class="small primary" id="focusEditBtn2">切换编辑</button>
              <button class="small" id="focusExitBtn">退出全屏</button>
            </div>
          </div>
          <div class="preview-shell">
            <article class="preview" id="preview"></article>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="search-results" id="searchResults"></div>

  <div class="outline-overlay" id="outlineOverlay">
    <div class="outline-shell">
      <div class="outline-top">
        <div>
          <div class="outline-title" id="outlineTitle">思维框架</div>
          <div class="mini-text">拖拽空白处或节点可移动画布；点击节点跳转；走丢时点“回到中心”</div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="soft" id="outlineCenterBtn">回到中心</button>
          <button class="soft" id="outlineFullBtn">框架全屏</button>
          <button id="closeOutlineBtn">关闭</button>
        </div>
      </div>
      <div class="mindmap" id="mindmap"></div>
    </div>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <h3 id="modalTitle">输入标题</h3>
      <input id="modalInput" placeholder="请输入名称" />
      <div class="modal-actions">
        <button id="modalCancel">取消</button>
        <button class="primary" id="modalOk">确定</button>
      </div>
    </div>
  </div>

  <div class="modal-mask" id="importMask">
    <div class="modal">
      <h3>导入备份 JSON</h3>
      <textarea id="importText" placeholder="把之前导出的 JSON 粘贴到这里"></textarea>
      <div class="modal-actions">
        <button id="importCancel">取消</button>
        <button id="importFileBtn">选择JSON文件</button>
        <button class="primary" id="importOk">导入覆盖</button>
      </div>
    </div>
  </div>

  <div class="html-center-mask" id="htmlCenterMask">
    <div class="html-center-panel" id="htmlCenterPanel">
      <div class="html-center-head">
        <div>
          <div class="html-center-title">HTML 渲染窗口</div>
          <div class="mini-text">居中弹出，不占用文章末尾位置；源码仍然只在编辑页显示</div>
        </div>
        <div class="html-center-actions">
          <button class="small soft" id="htmlCenterFullBtn">窗口全屏</button>
          <button class="small" id="htmlCenterCloseBtn">关闭</button>
        </div>
      </div>
      <iframe class="html-center-frame" id="htmlCenterFrame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script>
    (function () {
      const v = window.__APP_VERSION__ || Date.now();
      function loadScript(src) {
        const s = document.createElement('script');
        s.src = `${src}?v=${v}`;
        s.defer = true;
        document.body.appendChild(s);
      }
      loadScript('./src/app.js');
      loadScript('./src/pwa.js');
    })();
  </script>
</body>
</html>
