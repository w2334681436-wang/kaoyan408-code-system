.right{display:grid;grid-template-rows:auto 1fr;gap:10px;min-width:0;min-height:0}.toolbar{background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;box-shadow:0 10px 28px rgba(15,23,42,.05);display:flex;gap:8px;align-items:center;flex-wrap:wrap}.toolbar input{min-width:210px;flex:1}.toolbar select{width:112px}.tabs{margin-left:auto;display:flex;gap:6px}.tab.active{background:#dbeafe;color:#1e40af}.status{color:var(--muted);font-size:12px}.editor-box{height:100%;min-height:0;border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden;box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr}.codebar{padding:9px;border-bottom:1px solid var(--line);display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:#fbfdff}.monaco-wrap{height:100%;min-height:320px}.fallback{height:100%;display:grid;grid-template-columns:54px 1fr;background:#fff;overflow:hidden}.gutter{margin:0;padding:14px 8px;background:#f8fafc;border-right:1px solid var(--line);color:#94a3b8;font-family:var(--mono);font-size:14px;line-height:1.65;text-align:right;white-space:pre;overflow:hidden}.fb-stack{position:relative;overflow:hidden}.fb-hi,.fb-ta{position:absolute;inset:0;margin:0;padding:14px 16px;border:0;border-radius:0;font-family:var(--mono);font-size:14px;line-height:1.65;white-space:pre;overflow:auto;tab-size:4}.fb-hi{pointer-events:none}.fb-ta{background:transparent;color:transparent;caret-color:#111827;resize:none;outline:none;box-shadow:none!important;-webkit-text-fill-color:transparent}.note-area,.html-area{width:100%;height:100%;min-height:360px;font-family:var(--mono)}
.preview-wrap{max-width:1240px;margin:0 auto}.preview-panel{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}.preview-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:#fff;position:sticky;top:-20px;z-index:5}.preview-title h2{margin:0;font-size:22px}.preview-title div{color:var(--muted);font-size:13px;margin-top:5px}.preview-body{padding:22px;display:grid;gap:22px}.question-box{border:1px solid var(--line);border-radius:20px;padding:18px;background:#fff}.question-text{white-space:pre-wrap;line-height:1.85;font-size:16px;margin-bottom:14px}.preview-images{display:grid;gap:18px}.preview-images img{display:block;width:100%;height:auto;max-height:none;object-fit:contain;border:1px solid var(--line);border-radius:16px;background:#fff;cursor:zoom-in;box-shadow:0 10px 28px rgba(15,23,42,.04)}.preview-images.compact{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}.code-preview{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff}.code-preview-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);background:#f8fafc;color:#475569;font-size:13px}.code-preview pre{margin:0;padding:18px;overflow:auto;font-family:var(--mono);font-size:14px;line-height:1.72;white-space:pre;background:#fff}.note-preview{background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:16px;white-space:pre-wrap;line-height:1.8}.tok-c{color:#8a8f98;font-style:italic}.tok-s{color:#0f766e}.tok-k{color:#7c3aed;font-weight:700}.tok-t{color:#2563eb;font-weight:700}.tok-n{color:#ea580c}.tok-f{color:#0369a1}.tok-o{color:#64748b}
.modal{position:fixed;inset:0;display:none;z-index:100;background:rgba(15,23,42,.42);backdrop-filter:blur(8px);padding:18px}.modal.open{display:grid;place-items:center}.modal-card{width:min(1180px,96vw);max-height:94vh;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.22);overflow:hidden;display:grid;grid-template-rows:auto 1fr}.modal-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-body{overflow:auto;min-height:0}.demo-frame{width:100%;height:78vh;border:0;background:#fff}.image-modal img{display:block;max-width:100%;max-height:82vh;margin:auto}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(16px);background:#111827;color:#fff;border-radius:999px;padding:10px 14px;font-size:14px;opacity:0;transition:.18s;pointer-events:none;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.kbd{font-family:var(--mono);border:1px solid #cbd5e1;border-bottom-width:2px;border-radius:7px;background:#fff;padding:1px 5px;font-size:12px;color:#475569}.full:fullscreen{background:#fff;overflow:auto}.full:fullscreen .preview-panel{min-height:100vh;border:0;border-radius:0;box-shadow:none}.full:fullscreen .preview-head{top:0;border-radius:0}

/* 简化界面补丁：隐藏无用项 */
#difficultyInput,
#tagsInput,
#copyMethod,
#pNoteBtn { display:none !important; }
.form-hide-unused { display:none !important; }

/* 预览页顶部按钮栏固定，向下翻时也能随时点 */
#previewView .preview-head{

}

/* 按钮排版修复补丁 */
.topbar{height:auto!important;min-height:62px!important;align-items:center!important}
.topbar .actions{display:flex!important;flex-wrap:nowrap!important;gap:8px!important;align-items:center!important;justify-content:flex-end!important}
.topbar .actions button{min-width:72px;text-align:center}
.actions{gap:8px!important;align-items:center!important}
.tab[data-tab="note"],#notePanel{display:none!important}
.toolbar{gap:8px!important;align-items:center!important}
.toolbar button,.codebar button,.preview-head button,.topbar button{line-height:1.2}
.codebar{display:flex!important;flex-wrap:wrap!important;gap:8px!important;align-items:center!important}
.codebar .help{flex-basis:100%}
.preview-head .actions{display:flex!important;flex-wrap:wrap!important;gap:10px!important;justify-content:flex-end!important}
.preview-head select,.preview-head button{min-height:40px}
@media(max-width:900px){
  .topbar{display:grid!important;grid-template-columns:1fr!important;gap:8px!important;padding:8px 10px!important}
  .topbar .brand{justify-content:center!important;text-align:center}
  .topbar .actions{display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;width:100%!important;gap:8px!important}
  .topbar .actions button{width:100%!important;min-width:0!important;padding:10px 4px!important;border-radius:14px!important;font-size:15px!important}
  .toolbar{display:grid!important;grid-template-columns:1fr auto auto!important;gap:8px!important}

  .toolbar select{width:100%!important}
  .tabs{margin-left:0!important;justify-content:flex-end!important}

  .codebar .help{grid-column:1 / -1;text-align:center}
  .preview-head .actions{display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;width:100%!important}
  .preview-head .actions select,.preview-head .actions button{width:100%!important}
}

<div class="app">
<header class="topbar"><div class="brand"><div class="logo">408</div><div>考研408代码题系统<small id="globalStatus">未保存</small></div></div><div class="actions"><button class="ghost small" id="homeBtn">主页</button><button class="primary small" id="newBtn">新建题目</button><button class="small" id="exportBtn">导出</button><button class="small" id="importBtn">导入</button><input id="importFile" class="hide" type="file" accept=".json,application/json"></div></header>
<main id="homeView" class="view"><div class="wrap"><section class="hero"><div><h1>主页：题库列表</h1><p>用来整理 408 代码题：题图清晰展示，代码像正常 IDE 一样编写，方法可配备注和 HTML 动画演示。数据保存在本机浏览器。</p></div><div class="actions"><button class="primary" id="heroNew">＋ 新建题目</button><button id="sampleBtn">生成示例</button></div></section><div class="search"><input id="searchInput" placeholder="搜索题目、标签、代码、备注"><select id="sortSelect"><option value="updated">最近更新</option><option value="created">最近创建</option><option value="title">标题排序</option></select><select id="tagFilter"><option value="">全部标签</option></select></div><div id="stats" class="help"></div><div id="cards" class="cards"></div><div id="empty" class="empty hide"><h2>还没有题目</h2><p>点击“新建题目”，导入题目图片后开始写代码。</p></div></div></main>
<main id="editView" class="view hide"><div class="edit-layout"><aside class="panel scroll"><div class="panel-head"><div class="panel-title">题目信息</div><button class="small" id="previewFromEdit">预览</button></div><div class="panel-body"><div class="form"><div><div class="label">标题</div><input id="titleInput" style="width:100%" placeholder="例如：循环左移 / 银行家算法 / 二叉树遍历"></div><div class="two"><div><div class="label">科目</div><select id="typeInput" style="width:100%"><option>数据结构</option><option>操作系统</option><option>计算机组成原理</option><option>计算机网络</option><option>综合代码题</option></select></div><div><div class="label">难度</div><select id="difficultyInput" style="width:100%"><option>基础</option><option>中等</option><option>偏难</option><option>压轴</option></select></div></div><div><div class="label">标签</div><input id="tagsInput" style="width:100%" placeholder="用逗号分隔：数组,循环左移,408"></div><div><div class="label">题目文字，可不填</div><textarea id="questionInput" rows="6" style="width:100%" placeholder="不填时预览页不会显示任何占位文字。"></textarea></div><div><div class="label">题目图片</div><div class="drop" id="drop">点击导入图片，或拖拽/粘贴截图<br><span class="help">预览页会按整页宽度清晰展示，不再缩成小缩略图</span></div><input id="imageInput" class="hide" type="file" accept="image/*" multiple><div id="thumbs" class="thumbs"></div></div><div style="border-top:1px solid var(--line);padding-top:14px"><div class="panel-head" style="padding:0 0 10px;border:0"><div class="panel-title">方法列表</div><button class="primary small" id="addMethod">＋ 方法</button></div><div id="methodList" class="method-list"></div></div><button class="danger" id="deleteProblem">删除当前题目</button><p class="help">快捷键：<span class="kbd">Ctrl</span>+<span class="kbd">S</span> 保存，<span class="kbd">Ctrl</span>+<span class="kbd">Enter</span> 预览，<span class="kbd">Ctrl</span>+<span class="kbd">/</span> 注释。</p></div></div></aside><section class="right"><div class="toolbar"><input id="methodName" placeholder="方法名：考场写法 / 递归 / 非递归"><select id="language"><option value="cpp">C++</option><option value="c">C</option><option value="python">Python</option><option value="java">Java</option><option value="javascript">JavaScript</option><option value="plaintext">伪代码</option></select><button class="small danger" id="deleteMethod">删方法</button><div class="tabs"><button class="small tab active" data-tab="code">代码</button><button class="small tab" data-tab="html">HTML动画</button></div><span class="status" id="status">未保存</span></div><div id="codePanel" class="editor-box"><div class="codebar"><button class="small" id="formatBtn">整理缩进</button><button class="small" id="wrapBtn">自动换行</button><button class="small" id="fontMinus">A-</button><button class="small" id="fontPlus">A+</button><button class="small" data-snip="main">main</button><button class="small" data-snip="for">for</button><button class="small" data-snip="if">if</button><button class="small" data-snip="while">while</button><button class="small" data-snip="struct">struct</button><button class="small primary" id="quickPreviewBtn">预览</button><span class="help">Monaco/VSCode 编辑器；断网时自动降级为内置编辑器</span></div><div id="monaco" class="monaco-wrap"></div><div id="fallback" class="fallback hide"><pre id="gutter" class="gutter">1</pre><div class="fb-stack"><pre id="fbHi" class="fb-hi"><code></code></pre><textarea id="fbTa" class="fb-ta" spellcheck="false" autocomplete="off"></textarea></div></div></div><textarea id="notePanel" class="note-area hide" placeholder="写本方法思路、复杂度、易错点。"></textarea><textarea id="htmlPanel" class="html-area hide" placeholder="写 HTML/CSS/JS 动画演示代码，预览页点击“运行动画”渲染。"></textarea></section></div></main>

<script>
const DB_NAME="kaoyan408-code-system-flat-db",DB_VERSION=7,STORE="problems",CDN="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min";
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const uid=()=>"id_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8),now=()=>new Date().toISOString();
const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
const fmt=s=>s?new Date(s).toLocaleString("zh-CN",{hour12:false}):"";
function decodeHTML(s){
  const ta=document.createElement("textarea");
  ta.innerHTML=String(s??"");
  return ta.value;
}
function cleanCode(s){
  s=String(s??"");
  if(!s)return "";
  for(let i=0;i<8;i++){
    const before=s;
    s=decodeHTML(s);
    s=s.replace(/<\s*span\b[^>]*class\s*=\s*["']?tok-[^>]*>/gi,"");

      const box=diff.closest("div");

  }
  const tags=$("#tagsInput");
  if(tags){
    const box=tags.closest("div");

  }
  const copy=$("#copyMethod");

  if(noteBtn)noteBtn.classList.add("hide");

  if(noteTab)noteTab.classList.add("hide");
  const notePanel=$("#notePanel");
  if(notePanel)notePanel.classList.add("hide");
}

async function repairDirtyCodes(){
  const arr=await all();
  let changed=0;
  for(const p of arr){
    const before=JSON.stringify((p.methods||[]).map(m=>m.code||""));
    normalizeProblem(p);
    const after=JSON.stringify((p.methods||[]).map(m=>m.code||""));
    if(before!==after){
      p.updatedAt=now();
      await put(p);
      changed++;
    }
  }
  if(changed)toast(`已自动修复 ${changed} 道题的预览乱码`);
}


async function registerAutoSW(){
  if(!("serviceWorker" in navigator))return;
  let refreshing=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing)return;
    refreshing=true;
    location.reload();
  });
  try{
    const reg=await navigator.serviceWorker.register("./service-worker.js?auto=2",{scope:"./",updateViaCache:"none"});
    const check=()=>reg.update().catch(()=>{});
    check();
    setInterval(check,30*60*1000);
    document.addEventListener("visibilitychange",()=>{if(!document.hidden)check()});
    window.addEventListener("focus",check);
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;
      if(!nw)return;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed"&&navigator.serviceWorker.controller){
          nw.postMessage({type:"SKIP_WAITING"});
        }
      });
    });
  }catch(e){
    console.warn("Service Worker 自动更新注册失败",e);
  }
}

async function init(){db=await openDB();bind();await repairDirtyCodes();initMonaco();await registerAutoSW();await refresh();simplifyUnusedUI();show("home")}
init().catch(e=>document.body.innerHTML='<div style="padding:24px;font-family:sans-serif"><h2>初始化失败</h2><p>'+esc(e.message||e)+'</p></div>');
